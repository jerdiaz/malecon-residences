name: Deploy to VPS

# Se ejecuta en cada push a main, y también se puede lanzar a mano
# desde la pestaña "Actions" del repo.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Evita despliegues solapados si llegan varios pushes seguidos.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Si la llave NO tiene passphrase, deja el secret vacío o no lo crees.
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          # Puerto SSH: usa el secret si existe, si no asume 22.
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"

            echo "→ Trayendo últimos cambios de main..."
            git fetch --all
            git reset --hard origin/main

            echo "→ Instalando dependencias..."
            npm ci

            echo "→ Compilando (next build)..."
            npm run build

            echo "→ Reiniciando la app con PM2..."
            pm2 reload malecon || pm2 start npm --name malecon -- start
            pm2 save

            echo "✓ Despliegue completado."

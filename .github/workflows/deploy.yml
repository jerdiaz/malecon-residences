name: Deploy to VPS

# Se ejecuta en cada push a main, y también se puede lanzar a mano
# desde la pestaña "Actions" del repo.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Evita despliegues solapados si llegan varios pushes seguidos.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Si la llave NO tiene passphrase, deja el secret vacío o no lo crees.
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          # Puerto SSH: usa el secret si existe, si no asume 22.
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            APP_PATH="${{ secrets.VPS_APP_PATH }}"
            REPO_URL="https://github.com/jerdiaz/malecon-residences.git"
            # Puerto al que apunta nginx (maleconcenter.duckdns.org → localhost:3050).
            export PORT=3050

            # Si el directorio no existe (p. ej. lo borraron al reorganizar el VPS),
            # clonamos el repo en lugar de abortar en el cd.
            if [ ! -d "$APP_PATH/.git" ]; then
              echo "→ El directorio no existe; clonando el repo..."
              git clone "$REPO_URL" "$APP_PATH"
            fi

            cd "$APP_PATH"

            echo "→ Trayendo últimos cambios de main..."
            git fetch --all
            git reset --hard origin/main

            echo "→ Instalando dependencias..."
            npm ci

            echo "→ Compilando (next build)..."
            npm run build

            echo "→ Reiniciando la app con PM2 (PORT=$PORT)..."
            # Si el proceso no existe, lo creamos con el puerto correcto.
            pm2 reload malecon --update-env || pm2 start npm --name malecon --update-env -- start
            pm2 save

            echo "✓ Despliegue completado."
